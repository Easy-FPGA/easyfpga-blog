baseURL = 'https://easyfpga.blog/'
languageCode = 'en-us'
title = 'EasyFPGA'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = 'EasyFPGA'
  description = 'FPGA Tutorials, RTL Design, and IP Cores'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  math = true
  comments = true
  googleSiteVerification = "FBC2q9FRoQfXZDZJ4tHF7KjE4Q2w_3ffmlA7m1cHSsg"
  images = ["images/easyfpga_logo.jpg"]

  [params.label]
    icon = "images/easyfpga_logo.jpg"
    iconHeight = 35

  [params.homeInfoParams]
    Title = 'EasyFPGA'
    Content = 'FPGA tutorials, RTL design, and IP cores — from basics to production.<br><br><a href="/tools/crc-calculator/" style="display:inline-block;margin-top:4px;padding:8px 18px;background:#238636;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;font-size:0.9rem;">🔢 CRC Calculator — Free Online Tool</a> <a href="https://github.com/sponsors/Easy-FPGA" style="display:inline-block;margin-top:4px;padding:8px 18px;background:#ea4aaa;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;font-size:0.9rem;">♥ Sponsor</a>'

  [[params.socialIcons]]
    name = 'youtube'
    url = 'https://www.youtube.com/@easy-fpga'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/Easy-FPGA'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'categories'
    name = 'Categories'
    url = '/categories/'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 30

  [[menu.main]]
    identifier = 'courses'
    name = 'Courses'
    url = '/courses/'
    weight = 35

  [[menu.main]]
    identifier = 'crc-tool'
    name = '🔢 CRC Tool'
    url = '/tools/crc-calculator/'
    weight = 38

  [[menu.main]]
    identifier = 'ip-store'
    name = 'IP Store'
    url = '/ip-store/'
    weight = 40

  [[menu.main]]
    identifier = 'contact'
    name = 'Contact'
    url = '/contact/'
    weight = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = false
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$']]
      inline = [['$', '$']]
