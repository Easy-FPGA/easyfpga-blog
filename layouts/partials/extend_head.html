{{- if or .Params.math .Site.Params.math -}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66rGiqy" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof katex === 'undefined') return;
  document.querySelectorAll('.math-block').forEach(function(el) {
    katex.render(el.textContent, el, { displayMode: true, throwOnError: false });
  });
  document.querySelectorAll('.math-inline').forEach(function(el) {
    katex.render(el.textContent, el, { displayMode: false, throwOnError: false });
  });
});
</script>
{{- end -}}
