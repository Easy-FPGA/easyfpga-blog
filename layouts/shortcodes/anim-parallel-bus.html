<div style="background:#1a1a2e;border-radius:10px;padding:20px;margin:24px 0;font-family:monospace;">
  <div style="color:#a0aec0;font-size:0.8rem;margin-bottom:10px;">Parallel Bus — 8 data bits transferred simultaneously each clock cycle</div>
  <canvas id="parallelBusCanvas" width="680" height="130" style="width:100%;border-radius:6px;"></canvas>
  <div style="display:flex;gap:16px;margin-top:8px;font-size:0.78rem;flex-wrap:wrap;">
    <span style="color:#f6e05e;">&#9632; CLK</span>
    <span style="color:#68d391;">&#9632; D[7:0] data</span>
    <span style="color:#76e4f7;">&#9632; VALID</span>
  </div>
</div>

<script>
(function(){
  const c = document.getElementById('parallelBusCanvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const period = 90;
  let t = 0;
  const dataValues = ['A3','F0','12','7E','C9','55','88','3B'];

  function drawClk(y, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    for(let x=0;x<W;x++){
      const ph = (x + t) % period;
      const v = ph < period/2 ? y : y+22;
      x===0 ? ctx.moveTo(x,v) : ctx.lineTo(x,v);
    }
    ctx.stroke();
  }

  function drawData(y, color) {
    const H = y + 5;
    const L = y + 25;
    const M = (H + L) / 2;
    const tw = 8;

    function topY(x) {
      const ph = ((x + t) % period + period) % period;
      if (ph < tw) return M + (H - M) * (ph / tw);
      if (ph > period - tw) return H + (M - H) * ((ph - (period - tw)) / tw);
      return H;
    }
    function botY(x) {
      const ph = ((x + t) % period + period) % period;
      if (ph < tw) return M + (L - M) * (ph / tw);
      if (ph > period - tw) return L + (M - L) * ((ph - (period - tw)) / tw);
      return L;
    }

    // Fill between rails
    ctx.beginPath();
    ctx.moveTo(0, topY(0));
    for (let x = 1; x < W; x++) ctx.lineTo(x, topY(x));
    for (let x = W - 1; x >= 0; x--) ctx.lineTo(x, botY(x));
    ctx.closePath();
    ctx.fillStyle = 'rgba(104,211,145,0.12)';
    ctx.fill();

    // Top rail
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, topY(0));
    for (let x = 1; x < W; x++) ctx.lineTo(x, topY(x));
    ctx.stroke();

    // Bottom rail
    ctx.beginPath();
    ctx.moveTo(0, botY(0));
    for (let x = 1; x < W; x++) ctx.lineTo(x, botY(x));
    ctx.stroke();

    // Data value labels
    const baseSeg = Math.floor(t / period);
    const offset = t % period;
    for (let i = -1; i <= Math.ceil(W / period) + 1; i++) {
      const segX = i * period - offset;
      const labelX = segX + tw + 6;
      if (labelX >= 4 && labelX < W - 28) {
        const idx = ((baseSeg + i) % dataValues.length + dataValues.length) % dataValues.length;
        ctx.fillStyle = color;
        ctx.font = 'bold 11px monospace';
        ctx.fillText('0x' + dataValues[idx], labelX, M + 4);
      }
    }
  }

  function drawValid(y, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    for(let x=0;x<W;x++){
      const ph = (x + t) % period;
      const v = ph < 6 || ph > period-6 ? y+11 : y+2;
      x===0 ? ctx.moveTo(x,v) : ctx.lineTo(x,v);
    }
    ctx.stroke();
  }

  function label(text, y, color){
    ctx.fillStyle = color; ctx.font='11px monospace';
    ctx.fillText(text, 4, y);
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
    drawClk(10, '#f6e05e');
    label('CLK', 22, '#f6e05e');
    drawData(50, '#68d391');
    label('D[7:0]', 62, '#68d391');
    drawValid(95, '#76e4f7');
    label('VALID', 107, '#76e4f7');
    t = (t+0.7) % period;
    requestAnimationFrame(render);
  }
  render();
})();
</script>
