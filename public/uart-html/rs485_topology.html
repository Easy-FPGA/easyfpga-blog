<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 8px 16px; background: #f5f5f0; font-family: sans-serif; }
  h3 { color: #1a7a4a; font-size: 14px; margin: 0 0 6px 0; }
</style>
</head>
<body>
<h3>RS-485 Bus Topology (Multi-drop)</h3>
<svg width="700" height="175" viewBox="0 0 700 175">
  <rect width="700" height="175" fill="#f5f5f0"/>

  <!-- ── Master (FPGA) box ── -->
  <rect x="10" y="55" width="80" height="70" rx="8" fill="#1a8a5a" stroke="#0f6040" stroke-width="1.5"/>
  <text x="50" y="78" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Master</text>
  <text x="50" y="94" text-anchor="middle" font-size="12" fill="white" font-weight="bold">(FPGA)</text>
  <text x="50" y="113" text-anchor="middle" font-size="10" fill="#ccffcc">RS-485</text>

  <!-- A and B lines from Master -->
  <line x1="90" y1="78" x2="110" y2="78" stroke="#2c5aa0" stroke-width="2"/>
  <line x1="90" y1="108" x2="110" y2="108" stroke="#e67e22" stroke-width="2"/>

  <!-- Bus line A (horizontal) -->
  <line x1="110" y1="78" x2="630" y2="78" stroke="#2c5aa0" stroke-width="2.5"/>
  <!-- Bus line B (horizontal) -->
  <line x1="110" y1="108" x2="630" y2="108" stroke="#e67e22" stroke-width="2.5"/>

  <!-- Bus labels -->
  <text x="116" y="71" font-size="11" fill="#2c5aa0" font-weight="bold">A (+)</text>
  <text x="116" y="122" font-size="11" fill="#e67e22" font-weight="bold">B (−)</text>

  <!-- ── Left termination resistor [120Ω] ── -->
  <!-- Vertical line connecting A to B on left side -->
  <line x1="110" y1="78" x2="110" y2="88" stroke="#555" stroke-width="1.5"/>
  <rect x="102" y="88" width="16" height="20" rx="3" fill="#fff8e1" stroke="#b34700" stroke-width="1.5"/>
  <text x="110" y="102" text-anchor="middle" font-size="9" fill="#b34700">120Ω</text>
  <line x1="110" y1="108" x2="110" y2="108" stroke="#555" stroke-width="1.5"/>
  <text x="110" y="125" text-anchor="middle" font-size="9" fill="#888">Term.</text>

  <!-- ── Right termination resistor [120Ω] ── -->
  <line x1="630" y1="78" x2="630" y2="88" stroke="#555" stroke-width="1.5"/>
  <rect x="622" y="88" width="16" height="20" rx="3" fill="#fff8e1" stroke="#b34700" stroke-width="1.5"/>
  <text x="630" y="102" text-anchor="middle" font-size="9" fill="#b34700">120Ω</text>
  <line x1="630" y1="108" x2="630" y2="108" stroke="#555" stroke-width="1.5"/>
  <text x="630" y="125" text-anchor="middle" font-size="9" fill="#888">Term.</text>

  <!-- ── Nodes ── -->
  <!-- Node positions: x = 200, 310, 420, 530 -->

  <!-- Node 1 at x=200 -->
  <line x1="200" y1="78"  x2="200" y2="50" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="200" y1="108" x2="200" y2="136" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="162" y="30" width="76" height="22" rx="4" fill="#dce8f8" stroke="#2c5aa0" stroke-width="1.2"/>
  <text x="200" y="45" text-anchor="middle" font-size="11" fill="#1a3a6b">Node 1</text>
  <rect x="162" y="136" width="76" height="18" rx="3" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <text x="200" y="149" text-anchor="middle" font-size="10" fill="#555">Sensor / PLC</text>

  <!-- Node 2 at x=310 -->
  <line x1="310" y1="78"  x2="310" y2="50" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="310" y1="108" x2="310" y2="136" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="272" y="30" width="76" height="22" rx="4" fill="#dce8f8" stroke="#2c5aa0" stroke-width="1.2"/>
  <text x="310" y="45" text-anchor="middle" font-size="11" fill="#1a3a6b">Node 2</text>
  <rect x="272" y="136" width="76" height="18" rx="3" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <text x="310" y="149" text-anchor="middle" font-size="10" fill="#555">Sensor / PLC</text>

  <!-- Node 3 at x=420 -->
  <line x1="420" y1="78"  x2="420" y2="50" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="420" y1="108" x2="420" y2="136" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="382" y="30" width="76" height="22" rx="4" fill="#dce8f8" stroke="#2c5aa0" stroke-width="1.2"/>
  <text x="420" y="45" text-anchor="middle" font-size="11" fill="#1a3a6b">Node 3</text>
  <rect x="382" y="136" width="76" height="18" rx="3" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <text x="420" y="149" text-anchor="middle" font-size="10" fill="#555">Sensor / PLC</text>

  <!-- Node 32 at x=530 (with "..." before it) -->
  <text x="475" y="92" text-anchor="middle" font-size="16" fill="#999">···</text>
  <line x1="530" y1="78"  x2="530" y2="50" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="530" y1="108" x2="530" y2="136" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="490" y="30" width="80" height="22" rx="4" fill="#dce8f8" stroke="#2c5aa0" stroke-width="1.2"/>
  <text x="530" y="45" text-anchor="middle" font-size="11" fill="#1a3a6b">Node 32</text>
  <rect x="490" y="136" width="80" height="18" rx="3" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <text x="530" y="149" text-anchor="middle" font-size="10" fill="#555">Sensor / PLC</text>

  <!-- "Up to 32 nodes" label -->
  <text x="350" y="170" text-anchor="middle" font-size="10" fill="#888">Up to 32 nodes on a single bus (max 1,200 m)</text>
</svg>
</body>
</html>
