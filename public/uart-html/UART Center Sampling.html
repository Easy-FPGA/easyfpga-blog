<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UART Center Sampling</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', monospace; color: #ccc; }
    h2 { font-size: 15px; color: #90caf9; margin-bottom: 8px; letter-spacing: .5px; }
    canvas { border-radius: 8px; display: block; }
    #legend { margin-top: 10px; display: flex; gap: 20px; font-size: 12px; }
    .leg { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <h2>RX Center Sampling vs Edge Sampling</h2>
  <canvas id="c" width="720" height="230"></canvas>
  <div id="legend">
    <div class="leg"><div class="dot" style="background:#ef5350"></div>Edge sample — near transition, noise-sensitive</div>
    <div class="leg"><div class="dot" style="background:#66bb6a"></div>Center sample — maximum noise margin</div>
    <div class="leg"><div class="dot" style="background:#ffa726"></div>Center of bit period</div>
  </div>

  <script>
  (function () {
    var c = document.getElementById('c');
    var g = c.getContext('2d');
    var W = 720, H = 230;

    // Show a 5-bit window: prev(1) → mid(0) → next(1) (transitions visible)
    var bits = [1, 1, 0, 1, 1];
    var N = bits.length;
    var bw = 128, ox = (W - bw * N) / 2, ty = 96, th = 44;
    var phase = 0;

    // Noise parameters
    var noiseAmp = 6;    // noisy zone width (pixels from edge)
    var safeZoneL = 0.25; // fraction of bw that is safe (from center)
    var safeZoneR = 0.75;

    function noise(t, amp) {
      return (Math.sin(t * 7.3) + Math.sin(t * 13.1) * 0.5) * amp;
    }

    function draw() {
      g.clearRect(0, 0, W, H);
      g.fillStyle = '#0f1117'; g.fillRect(0, 0, W, H);

      // ── Draw waveform ──
      g.strokeStyle = '#42a5f5'; g.lineWidth = 2.5;
      g.beginPath();
      var y0 = ty - bits[0] * th;
      g.moveTo(ox, y0);
      for (var i = 0; i < N; i++) {
        var x0 = ox + bw * i, x1 = ox + bw * (i + 1);
        var yi = ty - bits[i] * th;
        var yn = i < N - 1 ? ty - bits[i + 1] * th : yi;
        g.lineTo(x1, yi);
        if (i < N - 1 && bits[i] !== bits[i + 1]) g.lineTo(x1, yn);
      }
      g.stroke();

      // ── For the middle bit (i=2), draw the analysis overlay ──
      var mid = 2; // bit index to analyze
      var bxL = ox + bw * mid, bxR = bxL + bw;
      var bCenter = bxL + bw / 2;
      var byMid = ty - bits[mid] * th;

      // Shade noise zones near transitions
      var nzW = bw * 0.12;
      // Left noise zone
      g.fillStyle = '#ef535020';
      g.fillRect(bxL - nzW / 2, ty - th - 12, nzW, th * 2 + 22);
      g.strokeStyle = '#ef535055'; g.lineWidth = 1; g.setLineDash([3, 3]);
      g.beginPath(); g.moveTo(bxL, ty - th - 12); g.lineTo(bxL, ty + th + 10); g.stroke();
      g.setLineDash([]);

      // Right noise zone
      g.fillStyle = '#ef535020';
      g.fillRect(bxR - nzW / 2, ty - th - 12, nzW, th * 2 + 22);
      g.strokeStyle = '#ef535055'; g.lineWidth = 1; g.setLineDash([3, 3]);
      g.beginPath(); g.moveTo(bxR, ty - th - 12); g.lineTo(bxR, ty + th + 10); g.stroke();
      g.setLineDash([]);

      // Safe zone shade (center region)
      g.fillStyle = '#66bb6a10';
      g.fillRect(bxL + nzW / 2, ty - th - 12, bw - nzW, th * 2 + 22);

      // Center dashed line
      g.strokeStyle = '#ffa72677'; g.lineWidth = 1.5; g.setLineDash([5, 4]);
      g.beginPath(); g.moveTo(bCenter, ty - th - 12); g.lineTo(bCenter, ty + th + 8); g.stroke();
      g.setLineDash([]);

      // ── BAUD_CNT arrows ──
      // Half-period arrow: start to center
      var arY = ty + th + 30;
      g.strokeStyle = '#ffa726'; g.lineWidth = 1.5;
      g.beginPath(); g.moveTo(bxL, arY); g.lineTo(bCenter, arY); g.stroke();
      // arrowhead right
      g.beginPath(); g.moveTo(bCenter - 8, arY - 4); g.lineTo(bCenter, arY); g.lineTo(bCenter - 8, arY + 4); g.stroke();
      // arrowhead left
      g.beginPath(); g.moveTo(bxL + 8, arY - 4); g.lineTo(bxL, arY); g.lineTo(bxL + 8, arY + 4); g.stroke();
      g.fillStyle = '#ffa726'; g.font = '10px monospace'; g.textAlign = 'center';
      g.fillText('BAUD_CNT_MAX/2', bxL + bw / 4, arY - 5);

      // Full-period arrow: start to end
      var arY2 = ty + th + 52;
      g.strokeStyle = '#446'; g.lineWidth = 1.5;
      g.beginPath(); g.moveTo(bxL, arY2); g.lineTo(bxR, arY2); g.stroke();
      g.beginPath(); g.moveTo(bxR - 8, arY2 - 4); g.lineTo(bxR, arY2); g.lineTo(bxR - 8, arY2 + 4); g.stroke();
      g.beginPath(); g.moveTo(bxL + 8, arY2 - 4); g.lineTo(bxL, arY2); g.lineTo(bxL + 8, arY2 + 4); g.stroke();
      g.fillStyle = '#668'; g.font = '10px monospace'; g.textAlign = 'center';
      g.fillText('BAUD_CNT_MAX  (1 bit period = 8.68 µs @ 115 200 bps)', bxL + bw / 2, arY2 - 5);

      // ── Edge sample (animated, oscillates near left edge) ──
      var edgeSx = bxL + bw * 0.06 + Math.sin(phase * 2.2) * bw * 0.05;
      var edgeSy = byMid;
      // noisy signal zig-zag near edge
      for (var k = 0; k < 3; k++) {
        var ex = bxL - nzW / 2 + k * nzW / 2;
        var ey = byMid + noise(phase + k * 0.7, noiseAmp);
        g.beginPath(); g.arc(ex, ey, 2, 0, Math.PI * 2);
        g.fillStyle = '#ef535066'; g.fill();
      }
      g.beginPath(); g.arc(edgeSx, edgeSy + noise(phase, noiseAmp * 0.6), 7, 0, Math.PI * 2);
      g.fillStyle = '#ef5350'; g.fill();
      g.strokeStyle = '#0f1117'; g.lineWidth = 1.2; g.stroke();
      // label
      g.fillStyle = '#ef9090'; g.font = 'bold 11px monospace'; g.textAlign = 'center';
      g.fillText('edge sample', edgeSx, ty - th - 15);
      g.fillStyle = '#ef535080'; g.font = '10px monospace';
      g.fillText('⚠ in noise zone', edgeSx, ty - th - 3);

      // ── Center sample (very slight oscillation, always in safe zone) ──
      var cenSx = bCenter + Math.sin(phase * 1.1) * 3;
      var cenSy = byMid;
      g.beginPath(); g.arc(cenSx, cenSy, 7, 0, Math.PI * 2);
      g.fillStyle = '#66bb6a'; g.fill();
      g.strokeStyle = '#0f1117'; g.lineWidth = 1.2; g.stroke();
      g.fillStyle = '#a5d6a7'; g.font = 'bold 11px monospace'; g.textAlign = 'center';
      g.fillText('center sample', cenSx, ty + th + 18);
      g.fillStyle = '#66bb6a88'; g.font = '10px monospace';
      g.fillText('✓ max noise margin', cenSx, ty + th + 30);

      // ── Bit labels ──
      var bnames = ['prev (1)', 'prev (1)', 'sampled bit (0)', 'next (1)', 'next (1)'];
      for (var i = 0; i < N; i++) {
        g.fillStyle = i === mid ? '#90caf9' : '#3a5060';
        g.font = (i === mid ? 'bold ' : '') + '10px monospace';
        g.textAlign = 'center';
        g.fillText(bnames[i], ox + bw * i + bw / 2, H - 5);
      }

      phase += 0.022;
      requestAnimationFrame(draw);
    }

    draw();
  })();
  </script>
</body>
</html>
